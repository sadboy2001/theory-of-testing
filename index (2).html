            if (step.type === 'quiz') {
                renderQuiz(contentBody, step, isCompleted);
            } else if (step.type === 'practice') {
                renderPractice(contentBody, step, isCompleted);
            } else {
                renderTheory(contentBody, step, isCompleted);
            }

        function renderTheory(container, step, isCompleted) {
            const { lesson } = getLessonById(state.currentLessonId);
            let html = `
                ${step.content}
                <div class="nav-actions" style="margin-top:40px; border-top:1px solid #eee; padding-top:20px;">

                </div>
            `;
            container.innerHTML = html;
        }

        function renderQuiz(container, step, isCompleted) {
            const controlType = step.multiple ? 'checkbox' : 'radio';
            const submitted = state.quizSubmitted;
            const wasCorrect = state.quizWasCorrect;
            
            let optionsHtml = '';
            step.options.forEach((opt, idx) => {
                const isSelected = state.selectedOptions.has(idx);
                const isCorrectAnswer = step.correctAnswers && step.correctAnswers.includes(idx);

                let stateClass = '';
                let resultIcon = '';
                if (submitted) {
                    if (isSelected && isCorrectAnswer) {
                        stateClass = 'correct';
                        resultIcon = '<span class="option-result-icon">✓</span>';
                    } else if (isSelected && !isCorrectAnswer) {
                        stateClass = 'incorrect';
                        resultIcon = '<span class="option-result-icon">✗</span>';
                    } else if (!isSelected && isCorrectAnswer) {
                        stateClass = 'missed';
                        resultIcon = '<span class="option-result-icon">✓</span>';
                    }
                } else if (isSelected) {
                    stateClass = 'selected';
                }

                const controlClass = `option-control ${controlType} ${isSelected || (submitted && isCorrectAnswer) ? 'selected' : ''}`;
                
                optionsHtml += `
                    <div class="quiz-option ${stateClass} ${submitted ? 'disabled' : ''}" 
                         onclick="${submitted ? '' : `toggleOption(${idx})`}">
                        <div class="${controlClass}">
                            <div class="option-control-dot"></div>
                        </div>
                        <span class="option-label">${opt}</span>
                        ${resultIcon}
                    </div>
                `;
            });

            const isSubmitDisabled = state.selectedOptions.size === 0;

            let resultBanner = '';
            if (submitted) {

        // --- Quiz Logic ---
        window.toggleOption = function(index) {
            const { lesson } = getLessonById(state.currentLessonId);
            const step = lesson.steps[state.currentStepIndex];
            if (state.quizSubmitted) return;

            if (!step.multiple) {
                state.selectedOptions.clear();
                state.selectedOptions.add(index);
            } else {
                if (state.selectedOptions.has(index)) {
                    state.selectedOptions.delete(index);
                } else {
                    state.selectedOptions.add(index);
                }
            }
            renderContent();
        };

        window.submitQuiz = function() {
            const { lesson } = getLessonById(state.currentLessonId);
            const step = lesson.steps[state.currentStepIndex];

            const correctSet = new Set(step.correctAnswers || []);
            const selectedSet = state.selectedOptions;

            // Check correctness
            const isCorrect = 
                selectedSet.size === correctSet.size &&
                [...selectedSet].every(v => correctSet.has(v));

            state.quizSubmitted = true;
            state.quizWasCorrect = isCorrect;

            if (isCorrect) {
                markComplete();
            }

            renderContent();
        };

        window.retryQuiz = function() {
            state.selectedOptions.clear();
            state.quizSubmitted = false;
            state.quizWasCorrect = false;
            renderContent();
        };

        function loadLesson(lessonId) {
            if (state.currentLessonId === lessonId) return;
            state.currentLessonId = lessonId;
            state.currentStepIndex = 0;
            state.selectedOptions.clear();
            state.quizSubmitted = false;
            state.quizWasCorrect = false;
            refreshAll();
        }

        function loadStep(index) {
            state.currentStepIndex = index;
            state.selectedOptions.clear();
            state.quizSubmitted = false;
            state.quizWasCorrect = false;
            renderTopBar();
            renderContent();
            document.querySelector('.main-content').scrollTop = 0;
        }

        function markComplete() {
            const stepId = getStepId(state.currentLessonId, state.currentStepIndex);
            if (!state.completedSteps.has(stepId)) {
                state.completedSteps.add(stepId);
                updateProgress();
                renderTopBar();
                renderContent();
                renderSidebar();
            }
        }

        function nextStep() {
            const { lesson } = getLessonById(state.currentLessonId);
            if (state.currentStepIndex < lesson.steps.length - 1) {
                loadStep(state.currentStepIndex + 1);
            }
        }

        function prevStep() {
            if (state.currentStepIndex > 0) {
                loadStep(state.currentStepIndex - 1);
            }
        }

        function getTotalSteps() {
            let total = 0;
            for (const chapter of courseData) {
                for (const lesson of chapter.lessons) {
                    total += lesson.steps.length;
                }
            }
            return total;
        }

        function updateProgress() {
            const count = state.completedSteps.size;
            const total = getTotalSteps();
            const textEl = document.getElementById('progress-text');
            const barEl = document.getElementById('progress-bar');
            
            textEl.textContent = `${count}/${total}`;
            const percent = Math.min(100, (count / total) * 100);
            barEl.style.width = `${percent}%`;
        }

        function refreshAll() {
            renderSidebar();
            renderTopBar();
            renderContent();
            updateProgress();
        }

                { id: 'QA-5', title: 'Обновить тестовую документацию', description: 'Актуализировать тест-план по итогам спринта. Добавить новые тест-кейсы для функций фильтрации и сортировки каталога.', priority: 'low', assignee: 'ta', col: 'done', created: '28.02.2026' }
            ],
            draggedId: null,
            modal: null, // 'create' | 'detail'
            detailTaskId: null,
            nextId: 6
        };

        function getAssignee(id) {
            return ASSIGNEES.find(a => a.id === id) || ASSIGNEES[0];
        }
        function getPriority(id) {
            return PRIORITIES.find(p => p.id === id) || PRIORITIES[2];
        }
        function getColLabel(id) {
            return KANBAN_COLS.find(c => c.id === id)?.label || id;
        }

        function renderPractice(container, step, isCompleted) {
            if (step.practiceType === 'testcase') {
                renderTCPractice(container, step, isCompleted);
            } else if (step.practiceType === 'reqreview') {
                renderReqReview(container, step, isCompleted);
            } else if (step.practiceType === 'checklist2tc') {
                renderChecklist2TC(container, step, isCompleted);
            } else if (step.practiceType === 'testdesign') {
                renderTestDesign(container, step, isCompleted);
            } else if (step.practiceType === 'bugclassify') {
                renderBugClassify(container, step, isCompleted);
            } else if (step.practiceType === 'diagram') {
                renderDiagram(container, step, isCompleted);
            } else if (step.practiceType === 'mindmap') {
                renderMindmap(container, step, isCompleted);
            } else {
                renderKanbanPractice(container, step, isCompleted);
            }
        }

        function renderKanbanPractice(container, step, isCompleted) {
            container.innerHTML = `
                <div class="practice-wrap">
                    <div class="practice-header">
                        <h1>📋 Таск-трекер — Практика</h1>

                    </div>
                    <div class="kanban-toolbar">

                        }

                </div>
            `;
            attachDragListeners();
        }

        // ══════════════════════════════════════════════
        // TEST-CASE PRACTICE
        // ══════════════════════════════════════════════
        const TC_REQS = [
            'Пользователь может оставить только один отзыв к купленному товару.',
            'Форма отправки отзыва доступна на детальной странице товара на вкладке «Отзывы».',
            'Форма открывается после нажатия на кнопку «Оставить отзыв».',
            'Кнопка «Оставить отзыв» отображается только авторизованным пользователям, если товар куплен и отзыв ещё не добавлен.',
            'Форма содержит: поле «Текст отзыва», необязательный чекбокс «Рекомендую книгу», кнопки «Отправить» и «Отменить».',
            'Минимальное количество символов в тексте отзыва = 20, максимальное = 500.',
            'Добавленные отзывы отображаются во вкладке «Отзывы» на детальной странице товара.'
        ];

        const TC_FIELD_DEFS = [
            {
                id:'tc-number', label:'Уникальный номер', req:true,
                hint:'Формат: префикс-число, например R-001',
                tag:'input', ph:'R-001',
                check(v) {
                    if (!v.trim()) return [false,'Поле обязательно для заполнения'];
                    if (!/^[A-Za-zА-Яа-яЁё0-9]{1,5}-\d+$/.test(v.trim()))
                        return [false,'Формат должен быть вида R-001 или TC-12'];
                    return [true,'✓ Правильный формат номера'];
                }
            },
            {
                id:'tc-title', label:'Заголовок', req:true,
                hint:'Отражает конкретную суть проверки',
                tag:'input', ph:'Добавление отзыва к купленной книге с пустым текстом',
                check(v) {
                    if (!v.trim()) return [false,'Поле обязательно для заполнения'];
                    if (v.trim().length < 15) return [false,'Слишком коротко — добавьте деталей о конкретной проверке'];
                    if (/^добавление отзыва к купленной книге$/i.test(v.trim()))
                        return [false,'Слишком общий заголовок — уточните, ЧТО именно проверяется'];
                    return [true,'✓ Заголовок отражает суть проверки'];
                }
            },
            {
                id:'tc-precond', label:'Предусловия', req:false,
                hint:'Конкретные условия перед тестом (или оставьте пустым)',
                tag:'textarea', ph:'Авторизоваться на stage.example.ru (логин: user_test, пароль: 1234)\nПерейти на страницу купленного товара (заказ в статусе "Закрыт")',
                rows:3,
                check(v) {
                    if (!v.trim()) return [true,'✓ Предусловия не требуются — поле пустое'];
                    if (v.trim().length < 10) return [false,'Слишком кратко — укажите конкретные условия'];
                    const hasData = /логин|login|пароль|pass|stage|http|user|статус/i.test(v);
                    if (!hasData) return [false,'Укажите конкретные данные: адрес стейджа, логин/пароль, статус заказа'];
                    return [true,'✓ Предусловия содержат конкретные данные'];
                }
            },
            {
                id:'tc-steps', label:'Шаги', req:true,
                hint:'Пронумерованный список действий, каждый — с конкретными данными',
                tag:'textarea', ph:'1. Открыть страницу товара на stage.example.ru\n2. Перейти на вкладку «Отзывы»\n3. Нажать кнопку «Оставить отзыв»\n4. Ввести в поле «Текст отзыва» значение «Lorem ipsum dolor sit amet, consectetur adipiscing»\n5. Нажать кнопку «Отправить»',
                rows:6,
                check(v) {
                    if (!v.trim()) return [false,'Поле обязательно для заполнения'];
                    const lines = v.split('\n').filter(l => l.trim().length > 0);
                    if (lines.length < 2) return [false,'Добавьте минимум 2 шага'];
                    const hasConcreteData = /lorem|user|login|значение|текст|символ|[0-9]{2,}|stage/i.test(v);
                    if (!hasConcreteData) return [false,'Правило №2: укажите конкретные данные в шагах (значения полей, URL и т.д.)'];
                    const hasUIclutter = /синюю|красную|зелёную|левой боковой|правой боков/i.test(v);
                    if (hasUIclutter) return [false,'Правило №3: не указывайте цвет кнопок и точное расположение (дизайн меняется)'];
                    return [true,'✓ Шаги содержат конкретные данные, без лишних UI-деталей'];
                }
            },
            {
                id:'tc-expected', label:'Ожидаемый результат', req:true,
                hint:'Детально: что должно измениться в системе',
                tag:'textarea', ph:'Отзыв успешно добавлен:\n— форма добавления отзыва закрывается\n— кнопка «Оставить отзыв» не отображается на странице\n— отзыв появляется в списке на вкладке «Отзывы»',
                rows:5,
                check(v) {
                    if (!v.trim()) return [false,'Поле обязательно для заполнения'];
                    if (v.trim().length < 20) return [false,'Слишком кратко — перечислите, что конкретно должно произойти'];
                    if (/^(добавлен отзыв|отзыв добавлен|работает|всё ок|ok|ок)\.?$/i.test(v.trim()))
                        return [false,'Правило №4: слишком обобщённо — перечислите конкретные изменения'];
                    const hasDetail = /закры|исчезн|отображ|появил|форма|кнопк|список|вкладк/i.test(v);
                    if (!hasDetail) return [false,'Правило №4: опишите, что происходит с формой, кнопкой и списком отзывов'];
                    return [true,'✓ Ожидаемый результат детализирован'];
                }
            }
        ];

        function renderTCPractice(container, step, isCompleted) {
            const reqHtml = TC_REQS.map((r,i) =>
                `<li data-n="${i+1}.">${r}</li>`).join('');

            const fieldsHtml = TC_FIELD_DEFS.map(f => {
                const input = f.tag === 'textarea'
                    ? `<textarea class="tc-textarea" id="${f.id}" placeholder="${f.ph}" rows="${f.rows||4}"></textarea>`
                    : `<input class="tc-input" id="${f.id}" type="text" placeholder="${f.ph}">`;
                return `<div class="tc-field" id="wrap-${f.id}">
                    <div class="tc-label">
                        ${f.label}
                        ${f.req ? '<span class="tc-required">*</span>' : ''}
                        <span class="tc-hint">${f.hint}</span>
                    </div>
                    ${input}
                    <div class="tc-feedback" id="fb-${f.id}"></div>
                </div>`;
            });

            // top two fields side by side
            const topRow = `<div class="tc-row2">${fieldsHtml[0]}${fieldsHtml[1]}</div>`;
            const rest = fieldsHtml.slice(2).join('');

            container.innerHTML = `
                <div class="tc-practice-wrap">
                    <h1>✍️ Практика: напишите тест-кейс</h1>
                    <p class="lesson-text">На основе требований ниже составьте тест-кейс для проверки добавления отзыва. Нажмите «Проверить» — правильные поля подсветятся зелёным, поля с ошибками — красным.</p>
                    <div class="tc-req-box">
                        <h3>📄 Требования к системе отзывов интернет-магазина</h3>
                        <ul class="tc-req-list">${reqHtml}</ul>
                    </div>
                    <div class="tc-form">
                        ${topRow}
                        ${rest}
                        <div id="tc-banner-area"></div>
                        <div class="tc-actions">
                            <button class="tc-btn-check" onclick="tcCheck()">🔍 Проверить</button>
                            <button class="tc-btn-reset" onclick="tcReset()">↺ Сбросить</button>
                            ${isCompleted ? '<span style="color:var(--accent-green);font-weight:700;">✓ Практика пройдена</span>' : ''}
                        </div>
                    </div>
                </div>`;
        }

        window.tcCheck = function() {
            let good = 0;
            TC_FIELD_DEFS.forEach(f => {
                const el   = document.getElementById(f.id);
                const wrap = document.getElementById('wrap-' + f.id);
                const fb   = document.getElementById('fb-'   + f.id);
                if (!el || !wrap || !fb) return;
                const [ok, msg] = f.check(el.value);
                wrap.classList.remove('state-ok','state-err');
                wrap.classList.add(ok ? 'state-ok' : 'state-err');
                fb.textContent = msg;
                if (ok) good++;
            });
            const total = TC_FIELD_DEFS.length;
            const area = document.getElementById('tc-banner-area');
            if (!area) return;
            if (good === total) {
                area.innerHTML = '<div class="tc-banner ok">🎉 Отлично! Все поля заполнены верно — тест-кейс составлен правильно.</div>';
                markComplete();
            } else if (good >= Math.ceil(total / 2)) {
                area.innerHTML = `<div class="tc-banner warn">⚠️ ${good} из ${total} полей верны. Исправьте красные поля и проверьте снова.</div>`;
            } else {
                area.innerHTML = `<div class="tc-banner fail">✗ ${good} из ${total} полей верны. Изучите подсказки в красных полях.</div>`;
            }
        };

        window.tcReset = function() {
            TC_FIELD_DEFS.forEach(f => {
                const el   = document.getElementById(f.id);
                const wrap = document.getElementById('wrap-' + f.id);
                const fb   = document.getElementById('fb-'   + f.id);
                if (el)   el.value = '';
                if (wrap) wrap.classList.remove('state-ok','state-err');
                if (fb)   fb.textContent = '';
            });
            const area = document.getElementById('tc-banner-area');
            if (area) area.innerHTML = '';
        };

        function renderKanbanBoard() {
            return KANBAN_COLS.map(col => {
                const tasks = kanbanState.tasks.filter(t => t.col === col.id);
                const cards = tasks.length
                    ? tasks.map(t => renderCard(t)).join('')
                    : `<div class="empty-col-hint">Перетащи сюда задачу</div>`;
                return `
                    <div class="kanban-col" data-col="${col.id}"
                         ondragover="kanbanDragOver(event)"
                         ondrop="kanbanDrop(event, '${col.id}')"
                         ondragenter="kanbanDragEnter(event)"
                         ondragleave="kanbanDragLeave(event)">
                        <div class="kanban-col-header">
                            <span class="kanban-col-title">${col.label}</span>
                            <span class="kanban-col-count">${tasks.length}</span>
                        </div>
                        ${cards}
                    </div>`;
            }).join('');
        }

        function renderCard(task) {
            const assignee = getAssignee(task.assignee);
            const priority = getPriority(task.priority);
            return `
                <div class="kanban-card" data-id="${task.id}" data-priority="${task.priority}"
                     draggable="true"
                     ondragstart="kanbanDragStart(event, '${task.id}')"
                     ondragend="kanbanDragEnd(event)"
                     onclick="kanbanOpenDetail('${task.id}')">
                    <div class="card-key">${task.id}</div>
                    <div class="card-title">${task.title}</div>
                    <div class="card-meta">
                        <div class="card-priority">
                            <div class="priority-dot ${task.priority}"></div>
                            ${priority.label}
                        </div>
                        <div class="card-assignee" title="${assignee.name}"
                             style="background:${assignee.color};color:white;">
                            ${assignee.initials}
                        </div>
                    </div>
                </div>`;
        }

        function refreshBoard() {
            const board = document.getElementById('kanban-board');
            if (board) {
                board.innerHTML = renderKanbanBoard();
                attachDragListeners();
            }
        }

        // ── Drag & Drop ──────────────────────────────
        function attachDragListeners() {
            // listeners are inline via ondragstart etc. — nothing extra needed
        }

        window.kanbanDragStart = function(e, id) {
            kanbanState.draggedId = id;
            e.currentTarget.classList.add('dragging');
            e.dataTransfer.effectAllowed = 'move';
            e.dataTransfer.setData('text/plain', id);
        };
        window.kanbanDragEnd = function(e) {
            e.currentTarget.classList.remove('dragging');
            document.querySelectorAll('.kanban-col').forEach(c => c.classList.remove('drag-over'));
        };
        window.kanbanDragOver = function(e) {
            e.preventDefault();
            e.dataTransfer.dropEffect = 'move';
        };
        window.kanbanDragEnter = function(e) {
            e.currentTarget.closest('.kanban-col')?.classList.add('drag-over');
        };
        window.kanbanDragLeave = function(e) {
            if (!e.currentTarget.contains(e.relatedTarget)) {
                e.currentTarget.classList.remove('drag-over');
            }
        };
        window.kanbanDrop = function(e, colId) {
            e.preventDefault();
            const id = e.dataTransfer.getData('text/plain') || kanbanState.draggedId;
            const task = kanbanState.tasks.find(t => t.id === id);
            if (task) task.col = colId;
            kanbanState.draggedId = null;
            refreshBoard();
        };

        // ── Create Task Modal ────────────────────────
        window.kanbanOpenCreate = function() {
            kanbanState.modal = 'create';
            showCreateModal();
        };

        function showCreateModal() {
            removeModal();
            const priorityOptions = PRIORITIES.map(p =>
                `<option value="${p.id}">${p.label}</option>`).join('');
            const assigneeOptions = ASSIGNEES.map(a =>
                `<option value="${a.id}">${a.name}</option>`).join('');
            const colOptions = KANBAN_COLS.map(c =>
                `<option value="${c.id}">${c.label}</option>`).join('');

            const el = document.createElement('div');
            el.className = 'kanban-modal-overlay';
            el.id = 'kanban-modal';
            el.innerHTML = `
                <div class="kanban-modal">
                    <div class="modal-header">
                        <h3>Создать задачу</h3>
                        <button class="modal-close" onclick="kanbanCloseModal()">✕</button>
                    </div>
                    <div class="modal-body">
                        <div class="modal-field">
                            <label>Заголовок *</label>
                            <input type="text" id="create-title" placeholder="Кратко опишите задачу..." oninput="validateCreateForm()">
                        </div>
                        <div class="modal-field">
                            <label>Описание</label>
                            <textarea id="create-desc" placeholder="Подробное описание задачи, шаги воспроизведения, критерии приёмки..."></textarea>
                        </div>
                        <div class="modal-field-row">
                            <div class="modal-field">
                                <label>Приоритет</label>
                                <select id="create-priority">${priorityOptions}</select>
                            </div>
                            <div class="modal-field">
                                <label>Ответственный</label>
                                <select id="create-assignee">${assigneeOptions}</select>
                            </div>
                        </div>
                        <div class="modal-field">
                            <label>Колонка</label>
                            <select id="create-col">${colOptions}</select>
                        </div>
                        <div class="modal-footer">
                            <button class="btn-modal-cancel" onclick="kanbanCloseModal()">Отмена</button>
                            <button class="btn-modal-create" id="btn-do-create" onclick="kanbanCreateTask()" disabled>Создать</button>

                    </div>
                </div>`;

        window.validateCreateForm = function() {
            const val = document.getElementById('create-title')?.value?.trim();
            const btn = document.getElementById('btn-do-create');
            if (btn) btn.disabled = !val;
        };

        window.kanbanCreateTask = function() {
            const title = document.getElementById('create-title').value.trim();
            if (!title) return;
            const desc     = document.getElementById('create-desc').value.trim();
            const priority = document.getElementById('create-priority').value;
            const assignee = document.getElementById('create-assignee').value;
            const col      = document.getElementById('create-col').value;
            const id = `QA-${kanbanState.nextId++}`;
            const today = new Date();
            const created = `${String(today.getDate()).padStart(2,'0')}.${String(today.getMonth()+1).padStart(2,'0')}.${today.getFullYear()}`;
            kanbanState.tasks.push({ id, title, description: desc || '—', priority, assignee, col, created });
            kanbanCloseModal();
            refreshBoard();
        };

        // ── Detail Modal ─────────────────────────────
        window.kanbanOpenDetail = function(id) {
            kanbanState.detailTaskId = id;
            showDetailModal(id);
        };

        function showDetailModal(id) {
            removeModal();
            const task = kanbanState.tasks.find(t => t.id === id);
            if (!task) return;
            const assignee  = getAssignee(task.assignee);
            const priority  = getPriority(task.priority);

            const statusClass = { todo: 'status-todo', inprogress: 'status-inprogress', review: 'status-review', done: 'status-done' }[task.col] || 'status-todo';

            const colOptions = KANBAN_COLS.map(c =>
                `<option value="${c.id}" ${c.id === task.col ? 'selected' : ''}>${c.label}</option>`).join('');
            const priorityOptions = PRIORITIES.map(p =>
                `<option value="${p.id}" ${p.id === task.priority ? 'selected' : ''}>${p.label}</option>`).join('');
            const assigneeOptions = ASSIGNEES.map(a =>
                `<option value="${a.id}" ${a.id === task.assignee ? 'selected' : ''}>${a.name}</option>`).join('');

            const el = document.createElement('div');
            el.className = 'kanban-modal-overlay';
            el.id = 'kanban-modal';
            el.innerHTML = `
                <div class="kanban-modal">
                    <div class="task-detail-header">
                        <div style="display:flex;justify-content:space-between;align-items:flex-start;">
                            <div>
                                <div class="task-detail-key">${task.id}</div>
                                <div class="task-detail-title">${task.title}</div>
                            </div>
                            <button class="modal-close" onclick="kanbanCloseModal()" style="margin-top:4px;">✕</button>
                        </div>
                    </div>
                    <div class="task-detail-body">
                        <div class="task-detail-main">

                            <div class="task-detail-description">${task.description || 'Описание не добавлено.'}</div>
                        </div>
                        <div class="task-detail-sidebar">
                            <div class="task-detail-field">
                                <div class="task-detail-field-label">Статус</div>
                                <select class="task-detail-select" onchange="kanbanUpdateField('${id}','col',this.value)">${colOptions}</select>
                            </div>
                            <div class="task-detail-field">
                                <div class="task-detail-field-label">Приоритет</div>
                                <select class="task-detail-select" onchange="kanbanUpdateField('${id}','priority',this.value)">${priorityOptions}</select>
                            </div>

                                <div class="task-detail-field-label">Создана</div>
                                <div class="task-detail-field-value">${task.created}</div>
                            </div>
                            <div class="task-detail-field">
                                <div class="task-detail-field-label">Проект</div>
                                <div class="task-detail-field-value" style="color:#0052cc;font-weight:700;">QA-ПРОЕКТ</div>
                            </div>
                        </div>
                    </div>

        window.rrCheck = function() {
            // Score: for each req that has errors, check if student found at least one correct crit
            const errReqs = RR_REQS.filter(r => r.errors.length > 0);
            let found = 0, falsePositives = 0;

            // Mark each req visually
            RR_REQS.forEach(r => {
                const el = document.getElementById('rr-req-' + r.id);
                if (!el) return;
                el.classList.remove('confirmed-err','confirmed-ok');
                const finding = rrState.findings.find(f => f.reqId === r.id);
                if (r.errors.length > 0) {
                    if (finding) {
                        const correctHit = finding.crits.some(c => r.errors.includes(c));
                        el.classList.add(correctHit ? 'confirmed-err' : 'confirmed-ok');
                        // badge
                        el.querySelectorAll('.rr-req-badge').forEach(b => b.remove());
                        const badge = document.createElement('span');
                        badge.className = 'rr-req-badge ' + (correctHit ? 'badge-err' : 'badge-ok');
                        badge.textContent = correctHit ? '✓ Найдено' : '? Критерий неверный';
                        el.appendChild(badge);
                        if (correctHit) found++;
                    } else {
                        // missed — mark after check
                        el.querySelectorAll('.rr-req-badge').forEach(b => b.remove());
                        const badge = document.createElement('span');
                        badge.className = 'rr-req-badge badge-err';
                        badge.textContent = '✗ Пропущено';
                        el.appendChild(badge);
                    }
                } else if (finding) {
                    // false positive
                    falsePositives++;
                    el.querySelectorAll('.rr-req-badge').forEach(b => b.remove());
                    const badge = document.createElement('span');
                    badge.className = 'rr-req-badge badge-ok';
                    badge.textContent = '? В этом требовании нет ошибок';
                    el.appendChild(badge);
                }
            });

            const total = errReqs.length; // 6 requirements with errors
            const area = document.getElementById('rr-score-area');
            if (!area) return;

            let msg = '', cls = '';
            if (found === total && falsePositives === 0) {
                msg = `🎉 Отлично! Найдены все ${total} нарушений без ложных срабатываний.`;
                cls = 'ok';
                markComplete();
            } else if (found >= Math.ceil(total * 0.6)) {
                msg = `⚠️ Найдено ${found} из ${total} нарушений${falsePositives > 0 ? `, ложных срабатываний: ${falsePositives}` : ''}. Посмотрите на отмеченные красным — там тоже есть проблемы.`;
                cls = 'warn';
            } else {
                msg = `✗ Найдено ${found} из ${total} нарушений. Внимательнее изучите каждое требование с позиции критериев из теории.`;
                cls = 'fail';
            }
            area.innerHTML = `<div class="rr-score-banner ${cls}">${msg}</div>`;
        };

                    <button class="cl2tc-skip-btn" onclick="cl2tcSelectItem(${(idx+1) % CL_ITEMS.length})">Пропустить →</button>
                </div>`;
        };

        function cl2tcValidateField(fieldId, itemId) {
            const el    = document.getElementById('cle-' + fieldId);
            const fbEl  = document.getElementById('clefb-' + fieldId);
            if (!el || !fbEl) return true;
            const rule   = CL_FIELD_RULES[fieldId];
            if (!rule) return true;
            const item   = CL_ITEMS.find(x => x.id === itemId);
            const [ok, msg] = rule.check(el.value, item);
            el.classList.remove('v-ok','v-err');
            el.classList.add(ok ? 'v-ok' : 'v-err');
            fbEl.className = 'tc-editor-fb ' + (ok ? 'ok' : 'err');
            fbEl.textContent = msg;
            return ok;
        }

        window.cl2tcSave = function() {
            const item = CL_ITEMS[cl2tcState.activeIdx];
            const fields = ['number','title','precond','steps','expected','tctype'];
            let allOk = true;
            fields.forEach(f => { if (!cl2tcValidateField(f, item.id)) allOk = false; });
            if (!allOk) return;

            cl2tcState.savedTCs[item.id] = {
                number:   document.getElementById('cle-number').value.trim(),
                title:    document.getElementById('cle-title').value.trim(),
                precond:  document.getElementById('cle-precond').value.trim(),
                steps:    document.getElementById('cle-steps').value.trim(),
                expected: document.getElementById('cle-expected').value.trim(),
                tctype:   document.getElementById('cle-tctype').value.trim(),
            };

            // Mark sidebar item done
            const cli = document.getElementById('cli-' + cl2tcState.activeIdx);
            if (cli) { cli.classList.remove('active'); cli.classList.add('done'); }
            cl2tcRenderProgress();
            cl2tcRenderSavedList();
        };

        window.cl2tcSaveAndNext = function() {
            const item = CL_ITEMS[cl2tcState.activeIdx];
            const fields = ['number','title','precond','steps','expected','tctype'];
            let allOk = true;
            fields.forEach(f => { if (!cl2tcValidateField(f, item.id)) allOk = false; });
            if (!allOk) return;

            cl2tcState.savedTCs[item.id] = {
                number:   document.getElementById('cle-number').value.trim(),
                title:    document.getElementById('cle-title').value.trim(),
                precond:  document.getElementById('cle-precond').value.trim(),
                steps:    document.getElementById('cle-steps').value.trim(),
                expected: document.getElementById('cle-expected').value.trim(),
                tctype:   document.getElementById('cle-tctype').value.trim(),
            };

            const cli = document.getElementById('cli-' + cl2tcState.activeIdx);
            if (cli) { cli.classList.remove('active'); cli.classList.add('done'); }
            cl2tcRenderProgress();
            cl2tcRenderSavedList();

            const nextIdx = cl2tcState.activeIdx + 1;
            if (nextIdx < CL_ITEMS.length) cl2tcSelectItem(nextIdx);
        };

        function cl2tcRenderProgress() {
            CL_ITEMS.forEach((item, i) => {
                const dot = document.getElementById('prog-' + i);
                if (!dot) return;
                dot.classList.remove('done','active');
                if (cl2tcState.savedTCs[item.id]) dot.classList.add('done');
                else if (i === cl2tcState.activeIdx) dot.classList.add('active');
            });
        }

        function cl2tcRenderSavedList() {
            const area = document.getElementById('cl2tc-saved-area');
            if (!area) return;
            const saved = Object.entries(cl2tcState.savedTCs);
            if (saved.length === 0) { area.innerHTML = ''; return; }
            area.innerHTML = `
                <div style="font-size:12px;font-weight:700;color:#172b4d;margin-bottom:8px;text-transform:uppercase;letter-spacing:.4px;">
                    Сохранённые тест-кейсы (${saved.length}/${CL_ITEMS.length})
                </div>
                <div class="tc-prev-list">
                    ${saved.map(([id, tc]) => `
                        <div class="tc-prev-item" onclick="cl2tcEditSaved('${id}')">
                            <span class="tc-prev-item-id">${tc.number||id}</span>
                            <span class="tc-prev-item-title">${tc.title}</span>
                            <span class="tc-prev-item-edit">✏️ изменить</span>
                        </div>`).join('')}
                </div>`;
        }

        window.cl2tcEditSaved = function(itemId) {
            const idx = CL_ITEMS.findIndex(x => x.id === itemId);
            if (idx >= 0) cl2tcSelectItem(idx);
        };

        window.cl2tcCheck = function() {
            const saved = Object.keys(cl2tcState.savedTCs).length;
            const total = CL_ITEMS.length;
            const banner = document.getElementById('cl2tc-banner');
            if (!banner) return;

            if (saved === total) {
                banner.innerHTML = '<div class="cl2tc-result-banner ok">🎉 Отлично! Все ' + total + ' тест-кейсов составлены. Отличная работа по переработке чек-листа!</div>';
                markComplete();
            } else if (saved >= Math.ceil(total * 0.6)) {
                banner.innerHTML = `<div class="cl2tc-result-banner warn">⚠️ Составлено ${saved} из ${total} тест-кейсов. Завершите оставшиеся пункты чек-листа.</div>`;
            } else {
                banner.innerHTML = `<div class="cl2tc-result-banner fail">Составлено ${saved} из ${total} тест-кейсов. Нажмите на пункты чек-листа слева и заполните форму для каждого.</div>`;
            }
        };

        window.cl2tcResetAll = function() {
            cl2tcState = { activeIdx: 0, savedTCs: {}, showList: false };
            document.querySelectorAll('.cl-item').forEach(el => el.classList.remove('done','active'));
            const area = document.getElementById('cl2tc-saved-area');
            if (area) area.innerHTML = '';
            const banner = document.getElementById('cl2tc-banner');
            if (banner) banner.innerHTML = '';
            cl2tcRenderProgress();
            cl2tcSelectItem(0);
        };

        window.tdBouquet = function() {
            const raw = document.getElementById('td-b-n')?.value ?? '';
            const el  = document.getElementById('td-b-r');
            if (!el) return;
            if (raw.trim() === '') { el.className='td-sim-result sim-neutral'; el.textContent='Введите количество'; return; }
            const n = Number(raw);
            if (!Number.isFinite(n) || !Number.isInteger(n) || raw.includes('.')) {
                el.className='td-sim-result sim-fail'; el.textContent='❌ «Некорректное количество» — нечисловой ввод'; return;
            }
            if (n < 1 || n > 200) {
                el.className='td-sim-result sim-fail'; el.textContent=`❌ «Некорректное количество» (введено: ${n})`; return;
            }
            const price = n<=24?131:n<=34?108:n<=50?96:n<=100?89:84;
            const total = (n*price).toLocaleString('ru-RU');
            el.className='td-sim-result sim-ok';
            el.textContent=`✅ ${n} роз × ${price} ₽ = ${total} ₽`;
        };

        window.tdSurname = function() {
            const v  = document.getElementById('td-s-v')?.value ?? '';
            const el = document.getElementById('td-s-r');
            if (!el) return;
            if (v === '') { el.className='td-sim-result sim-info'; el.textContent='ℹ️ «Введите фамилию»'; return; }
            const cyr = /^[А-ЯЁа-яё]+$/.test(v);
            if (!cyr)       { el.className='td-sim-result sim-fail'; el.textContent=`❌ «Отклонено» — только кириллица (введено: "${v}")`; return; }
            if (v.length<2) { el.className='td-sim-result sim-fail'; el.textContent=`❌ «Отклонено» — слишком коротко (${v.length} симв., мин. 2)`; return; }
            if (v.length>20){ el.className='td-sim-result sim-fail'; el.textContent=`❌ «Отклонено» — слишком длинно (${v.length} симв., макс. 20)`; return; }
            el.className='td-sim-result sim-ok'; el.textContent=`✅ «Принято» — "${v}" (${v.length} симв.)`;
        };

        window.tdExpiry = function() {
            const v  = (document.getElementById('td-e-v')?.value ?? '').trim();
            const el = document.getElementById('td-e-r');
            if (!el) return;
            const m = v.match(/^(\d{2})\.(\d{2})\.(\d{4})$/);
            if (!m) { el.className='td-sim-result sim-fail'; el.textContent='❌ «Некорректная дата» — неверный формат'; return; }
            const d = new Date(+m[3], +m[2]-1, +m[1]);
            if (isNaN(d) || d.getDate()!==+m[1]) { el.className='td-sim-result sim-fail'; el.textContent='❌ «Некорректная дата» — несуществующая дата'; return; }
            const today = new Date(); today.setHours(0,0,0,0);
            const diff  = Math.floor((today - d)/86400000);
            if (diff < 0)   { el.className='td-sim-result sim-info'; el.textContent=`ℹ️ Дата в будущем (+${-diff} дн.) → «Свежий товар»`; return; }
            if (diff <= 7)  { el.className='td-sim-result sim-ok';   el.textContent=`✅ «Свежий товар» (${diff} дн. назад)`; return; }
            if (diff <= 30) { el.className='td-sim-result sim-warn';  el.textContent=`⚠️ «Залежавшийся товар» (${diff} дн. назад)`; return; }

        function bcGradeCard(id) {
            const bug = BC_BUGS.find(b => b.id === id);

            const card = document.getElementById('bc-card-' + id);
            const fb   = document.getElementById('bc-fb-'   + id);
            const sevEl= document.getElementById('bc-sev-'  + id);
            const priEl= document.getElementById('bc-pri-'  + id);
            if (!bug || !card || !fb) return;

            const sevOk = ans.sev === bug.sev;
            const priOk = ans.pri === bug.pri;
            const allOk = sevOk && priOk;

            card.classList.remove('graded-ok','graded-err');
            card.classList.add(allOk ? 'graded-ok' : 'graded-err');

                    { id:'c5', text:'Результат «Ставка 15%»', fn: (g) => g.nodes.some(n=>/15/i.test(n.label)) },

            },
            'state-machine': {
                title: '🔄 Схема состояний: заявка на кредит',
                reqText: `<strong>Условия:</strong><br>
• При подаче заявления создаётся заявка → статус <strong>«Создана»</strong><br>
• После проверки кредитной истории:<br>

&nbsp;&nbsp;– Средняя → <strong>«На уточнении»</strong><br>
&nbsp;&nbsp;– Хорошая → <strong>«Одобрена»</strong><br>
• Из «На уточнении»:<br>
&nbsp;&nbsp;– Доход > 100 000 → <strong>«Одобрена»</strong><br>
&nbsp;&nbsp;– Доход ≤ 100 000 → <strong>«Отклонена»</strong><br>
• Из «Одобрена»:<br>

&nbsp;&nbsp;– Клиент получил кредит → <strong>«Выдана»</strong>`,
                palette: [
                    { id:'state-start', label:'⬤ Начальный',    cls:'pal-state-start', cnCls:'cn-state-start', hint:'Стартовое состояние' },
                    { id:'state-mid',   label:'◈ Промежуточный', cls:'pal-state-mid',   cnCls:'cn-state-mid',   hint:'Промежуточное состояние' },

                    { id:'state-err',   label:'❌ Финал (отказ)', cls:'pal-state-err',   cnCls:'cn-state-err',   hint:'Конечный статус-отказ' },
                ],
                checks: [
                    { id:'s1', text:'Начальное состояние «Создана»',   fn:(g)=>g.nodes.some(n=>n.type==='state-start'&&/создан/i.test(n.label)) },
                    { id:'s2', text:'Состояние «На уточнении»',         fn:(g)=>g.nodes.some(n=>/уточнени/i.test(n.label)) },
                    { id:'s3', text:'Состояние «Одобрена»',              fn:(g)=>g.nodes.some(n=>/одобрен/i.test(n.label)) },
                    { id:'s4', text:'Конечный статус «Отклонена» (❌)', fn:(g)=>g.nodes.some(n=>n.type==='state-err'&&/отклонен/i.test(n.label)) },
                    { id:'s5', text:'Конечный статус «Выдана» (✅)',    fn:(g)=>g.nodes.some(n=>n.type==='state-ok'&&/выдан/i.test(n.label)) },
                    { id:'s6', text:'Переход из «Создана» в «Отклонена» (плохая история)', fn:(g)=>hasEdge(g,/создан/i,/отклонен/i) },
                    { id:'s7', text:'Переход из «Создана» в «На уточнении» (средняя история)', fn:(g)=>hasEdge(g,/создан/i,/уточнени/i) },
                    { id:'s8', text:'Переход из «Создана» в «Одобрена» (хорошая история)',  fn:(g)=>hasEdge(g,/создан/i,/одобрен/i) },
                    { id:'s9', text:'Переходы из «На уточнении» в «Одобрена» и «Отклонена»', fn:(g)=>hasEdge(g,/уточнени/i,/одобрен/i)&&hasEdge(g,/уточнени/i,/отклонен/i) },
                    { id:'s10',text:'Переходы из «Одобрена» в «Отклонена» и «Выдана»', fn:(g)=>hasEdge(g,/одобрен/i,/отклонен/i)&&hasEdge(g,/одобрен/i,/выдан/i) },
                ],
                hint: 'Начните с узла «Создана» (начальный статус). Добавьте промежуточные состояния, затем финальные. Соедините их стрелками и подпишите каждый переход.'
            }
        };

        function hasEdge(g, fromRe, toRe) {
            return g.edges.some(e => {
                const f = g.nodes.find(n=>n.id===e.from);
                const t = g.nodes.find(n=>n.id===e.to);
                return f && t && fromRe.test(f.label) && toRe.test(t.label);
            });
        }

        // ─── Per-instance state ──────────────────────────────────
        // Each diagram editor gets its own state object keyed by diagramType
        const diagStates = {};
        function getDiagState(type) {
            if (!diagStates[type]) {
                diagStates[type] = {
                    nodes: [],        // {id,type,cls,label,x,y}
                    edges: [],        // {id,from,to,label}
                    nextNodeId: 1,
                    nextEdgeId: 1,
                    mode: 'select',   // 'select'|'connect'
                    connSource: null,
                    dragging: null,   // {nodeId, ox, oy}
                    selectedNode: null,
                    selectedEdge: null,
                    editingEdge: null,
                };
            }
            return diagStates[type];
        }

        // ─── Render entry point ───────────────────────────────────
        function renderDiagram(container, step, isCompleted) {
            const type = step.diagramType;
            const task = DIAG_TASKS[type];
            if (!task) { container.innerHTML='<p>Неизвестный тип диаграммы</p>'; return; }

            const palHtml = task.palette.map(p => `
                <div class="diag-palette-item ${p.cls}" draggable="true"
                     data-ptype="${p.id}" data-pcls="${p.cnCls}"
                     title="${p.hint}">${p.label}</div>`).join('');

            container.innerHTML = `
                <div class="diag-wrap">
                    <h1>${task.title}</h1>
                    <p class="lesson-text" style="color:#6b778c;font-size:13px;margin-bottom:10px;">
                        Перетаскивайте элементы из панели на холст, затем соединяйте их стрелками.
                    </p>
                    <div class="diag-layout">
                        <!-- Sidebar -->
                        <div class="diag-sidebar">
                            <div>
                                <div class="diag-sidebar-section">📋 Требования</div>
                                <div class="diag-req-box">${task.reqText}</div>
                            </div>
                            <div>
                                <div class="diag-sidebar-section">🧩 Элементы</div>
                                <div class="diag-palette" id="diag-palette-${type}">${palHtml}</div>
                            </div>
                            <div style="font-size:11px;color:#6b778c;line-height:1.5;background:#fff8e6;border-radius:6px;padding:8px;border:1px solid #ffe380;">
                                💡 ${task.hint}
                            </div>
                        </div>
                        <!-- Canvas area -->
                        <div>
                            <div class="diag-canvas-wrap">
                                <div class="diag-toolbar">
                                    <button class="diag-tb-btn active" id="diag-mode-select-${type}" onclick="diagSetMode('${type}','select')">↖ Выбор</button>
                                    <button class="diag-tb-btn" id="diag-mode-connect-${type}" onclick="diagSetMode('${type}','connect')">→ Соединить</button>
                                    <div class="diag-tb-sep"></div>
                                    <button class="diag-tb-btn" onclick="diagDeleteSelected('${type}')">🗑 Удалить</button>
                                    <div class="diag-tb-hint" id="diag-hint-${type}">Перетащите элемент из панели слева на холст</div>
                                </div>
                                <div class="diag-canvas" id="diag-canvas-${type}">
                                    <svg class="diag-svg-layer" id="diag-svg-${type}"></svg>
                                    <input type="text" id="diag-label-input" placeholder="Подпись стрелки…"
                                        onkeydown="diagLabelKey(event,'${type}')"
                                        onblur="diagLabelBlur('${type}')">
                                </div>
                            </div>
                            <!-- Checklist -->
                            <div class="diag-check-panel">
                                <h4>✅ Что должно быть в диаграмме</h4>
                                <ul class="diag-checklist" id="diag-checklist-${type}">
                                    ${task.checks.map(c=>`
                                        <li id="diag-chk-${type}-${c.id}">
                                            <span class="diag-chk-icon diag-chk-miss">○</span>
                                            <span>${c.text}</span>
                                        </li>`).join('')}
                                </ul>
                                <button class="diag-verify-btn" onclick="diagVerify('${type}')">🔍 Проверить</button>
                                <button class="diag-clear-btn" onclick="diagClear('${type}')">↺ Очистить</button>
                                <div id="diag-result-${type}"></div>
                            </div>
                        </div>
                    </div>
                </div>`;

            diagBindCanvas(type);
            diagBindPalette(type);
            diagRedraw(type);
        }

        // ─── Canvas bindings ──────────────────────────────────────
        function diagBindCanvas(type) {
            const canvas = document.getElementById('diag-canvas-' + type);
            if (!canvas) return;

            // Drop from palette
            canvas.addEventListener('dragover', e => e.preventDefault());
            canvas.addEventListener('drop', e => {
                e.preventDefault();
                const ptype = e.dataTransfer.getData('ptype');
                const pcls  = e.dataTransfer.getData('pcls');
                if (!ptype) return;
                const rect = canvas.getBoundingClientRect();
                const x = e.clientX - rect.left - 60;
                const y = e.clientY - rect.top  - 20;
                diagAddNode(type, ptype, pcls, x, y);
            });

            canvas.addEventListener('mousedown', e => {
                const st = getDiagState(type);
                if (e.target === canvas || e.target.tagName === 'svg') {
                    st.selectedNode = null;
                    st.selectedEdge = null;
                    diagRedraw(type);
                }
            });
        }

        function diagBindPalette(type) {
            const pal = document.getElementById('diag-palette-' + type);
            if (!pal) return;
            pal.querySelectorAll('.diag-palette-item').forEach(item => {
                item.addEventListener('dragstart', e => {
                    e.dataTransfer.setData('ptype', item.dataset.ptype);
                    e.dataTransfer.setData('pcls',  item.dataset.pcls);
                });
            });
        }

        // ─── Mode ─────────────────────────────────────────────────
        window.diagSetMode = function(type, mode) {
            const st = getDiagState(type);
            st.mode = mode;
            st.connSource = null;
            const canvas = document.getElementById('diag-canvas-' + type);
            if (canvas) canvas.classList.toggle('mode-connect', mode==='connect');
            const hintEl = document.getElementById('diag-hint-' + type);
            if (hintEl) hintEl.textContent = mode === 'connect'
                ? 'Кликните по первому узлу, затем по второму — появится стрелка'
                : 'Кликайте по стрелке дважды, чтобы изменить подпись; перетаскивайте узлы';
            document.getElementById('diag-mode-select-'  + type)?.classList.toggle('active', mode==='select');
            document.getElementById('diag-mode-connect-' + type)?.classList.toggle('active', mode==='connect');
        };

        // ─── Add node ─────────────────────────────────────────────
        function diagAddNode(type, ntype, ncls, x, y) {
            const st = getDiagState(type);
            const defaults = {
                'question':   'Вопрос?',
                'result-ok':  'Результат',
                'result-err': 'Отказ',
                'state-start':'Создана',
                'state-mid':  'Состояние',
                'state-ok':   'Финал OK',
                'state-err':  'Финал ❌',
            };
            const node = {
                id: 'n' + (st.nextNodeId++),
                type: ntype, cls: ncls,
                label: defaults[ntype] || 'Узел',
                x: Math.max(0, x), y: Math.max(0, y)
            };
            st.nodes.push(node);
            diagRedraw(type);
        }

        // ─── Full redraw ──────────────────────────────────────────
        function diagCreateNodeEl(type, n) {
            const canvas = document.getElementById('diag-canvas-' + type);
            if (!canvas) return;

            const el = document.createElement('div');
            el.className = 'diag-cnode ' + n.cls;
            el.id = 'diag-node-' + n.id + '-' + type;
            el.style.left = n.x + 'px';
            el.style.top  = n.y + 'px';

            // ── drag handle (wide, easy to grab) ──
            const handle = document.createElement('div');
            handle.className = 'diag-cnode-handle';
            handle.textContent = '⠿⠿⠿';
            handle.title = 'Перетащить';
            el.appendChild(handle);

            // ── label textarea ──
            const body = document.createElement('div');
            body.className = 'diag-cnode-body';
            const ta = document.createElement('textarea');
            ta.className = 'diag-cnode-edit';
            ta.rows = 2;
            ta.value = n.label;
            ta.addEventListener('input', () => {
                n.label = ta.value;
                diagAutoResizeTa(ta);
                diagRedrawEdges(type);
                diagLiveCheck(type);
            });
            // textarea: only stop propagation on actual text interaction, not mousedown
            ta.addEventListener('mousedown', e => e.stopPropagation());
            diagAutoResizeTa(ta);
            body.appendChild(ta);
            el.appendChild(body);

            // ── delete button ──
            const del = document.createElement('button');
            del.className = 'diag-cnode-del';
            del.innerHTML = '&times;';
            del.title = 'Удалить узел';
            del.addEventListener('mousedown', e => e.stopPropagation());
            del.addEventListener('click', e => {
                e.stopPropagation();
                e.preventDefault();
                diagDeleteNode(type, n.id);
            });
            el.appendChild(del);

            // ── drag on handle (and anywhere except textarea/del) ──
            function startDrag(e) {
                if (e.target === ta || e.target === del) return;
                const st2 = getDiagState(type);
                // connect mode: click = connect, not drag
                if (st2.mode === 'connect') {
                    diagHandleConnect(type, n.id);
                    return;
                }
                // select
                st2.selectedNode = n.id;
                st2.selectedEdge = null;
                diagUpdateNodeClasses(type);

                const canvasRect = canvas.getBoundingClientRect();
                const startX = e.clientX - n.x;
                const startY = e.clientY - n.y;
                let moved = false;

                function onMove(ev) {
                    moved = true;
                    n.x = Math.max(0, Math.min(ev.clientX - startX, canvas.clientWidth  - el.offsetWidth));
                    n.y = Math.max(0, Math.min(ev.clientY - startY, canvas.clientHeight - el.offsetHeight));
                    el.style.left = n.x + 'px';
                    el.style.top  = n.y + 'px';
                    diagRedrawEdges(type);
                }
                function onUp() {
                    document.removeEventListener('mousemove', onMove);
                    document.removeEventListener('mouseup', onUp);
                    el.style.cursor = '';
                }
                document.addEventListener('mousemove', onMove);
                document.addEventListener('mouseup', onUp);
                el.style.cursor = 'grabbing';
                e.preventDefault();
            }

            handle.addEventListener('mousedown', startDrag);
            el.addEventListener('mousedown', startDrag);

            canvas.appendChild(el);
            return el;
        }

        // Update classes without rebuilding DOM
        function diagUpdateNodeClasses(type) {
            const st = getDiagState(type);
            st.nodes.forEach(n => {
                const el = document.getElementById('diag-node-' + n.id + '-' + type);
                if (!el) return;
                el.className = 'diag-cnode ' + n.cls
                    + (st.selectedNode === n.id ? ' selected' : '')
                    + (st.connSource   === n.id ? ' conn-source' : '');
            });
        }

        function diagRedraw(type) {
            const st     = getDiagState(type);
            const canvas = document.getElementById('diag-canvas-' + type);
            const svgEl  = document.getElementById('diag-svg-' + type);
            if (!canvas || !svgEl) return;

            // Only create DOM nodes that don't exist yet; update existing ones
            const existingIds = new Set(
                [...canvas.querySelectorAll('.diag-cnode')].map(el => {
                    const m = el.id.match(/^diag-node-(n\d+)-/);
                    return m ? m[1] : null;
                }).filter(Boolean)
            );

            // Remove nodes no longer in state
            canvas.querySelectorAll('.diag-cnode').forEach(el => {
                const m = el.id.match(/^diag-node-(n\d+)-/);
                if (m && !st.nodes.find(n => n.id === m[1])) el.remove();
            });

            // Create new nodes
            st.nodes.forEach(n => {
                if (!existingIds.has(n.id)) {
                    diagCreateNodeEl(type, n);
                }
            });

            // Update positions and classes (nodes may have been moved by data change)
            diagUpdateNodeClasses(type);

            diagRedrawEdges(type);
            diagLiveCheck(type);
        }

        function diagAutoResizeTa(ta) {
            ta.style.height = '0';
            ta.style.height = ta.scrollHeight + 'px';
        }

        // ─── Draw edges (SVG) ─────────────────────────────────────
        function diagRedrawEdges(type) {
            const st    = getDiagState(type);
            const canvas= document.getElementById('diag-canvas-' + type);
            const svgEl = document.getElementById('diag-svg-' + type);
            if (!svgEl || !canvas) return;

            svgEl.innerHTML = `<defs>
                <marker id="dah-${type}" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
                    <path d="M0,0 L0,6 L9,3 z" fill="#6b778c"/>
                </marker>
                <marker id="dah-sel-${type}" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
                    <path d="M0,0 L0,6 L9,3 z" fill="#ff8b00"/>
                </marker>
            </defs>`;

            st.edges.forEach(edge => {
                const fn = st.nodes.find(n=>n.id===edge.from);
                const tn = st.nodes.find(n=>n.id===edge.to);
                if (!fn || !tn) return;

                const fEl = document.getElementById('diag-node-' + fn.id + '-' + type);
                const tEl = document.getElementById('diag-node-' + tn.id + '-' + type);
                const fw = fEl ? fEl.offsetWidth  : 100;
                const fh = fEl ? fEl.offsetHeight : 40;
                const tw = tEl ? tEl.offsetWidth  : 100;
                const th = tEl ? tEl.offsetHeight : 40;

                const x1 = fn.x + fw/2, y1 = fn.y + fh/2;
                const x2 = tn.x + tw/2, y2 = tn.y + th/2;

                // offset to avoid node overlap — find edge of node
                const dx = x2-x1, dy = y2-y1, len = Math.sqrt(dx*dx+dy*dy)||1;
                const sx1 = x1 + (dx/len)*(fw/2+2), sy1 = y1 + (dy/len)*(fh/2+2);
                const sx2 = x2 - (dx/len)*(tw/2+10), sy2 = y2 - (dy/len)*(th/2+10);

                const isSel = st.selectedEdge === edge.id;
                const marker = isSel ? `url(#dah-sel-${type})` : `url(#dah-${type})`;

                // Slight curve for self-loops or parallel edges
                const mx = (sx1+sx2)/2, my = (sy1+sy2)/2;
                const cx = mx - dy/len*30, cy = my + dx/len*30;

                const g = document.createElementNS('http://www.w3.org/2000/svg','g');
                g.classList.add('diag-edge');
                g.dataset.eid = edge.id;

                const hit = document.createElementNS('http://www.w3.org/2000/svg','path');
                hit.setAttribute('d', `M${sx1},${sy1} Q${cx},${cy} ${sx2},${sy2}`);
                hit.classList.add('diag-edge-hit');
                g.appendChild(hit);

                const line = document.createElementNS('http://www.w3.org/2000/svg','path');
                line.setAttribute('d', `M${sx1},${sy1} Q${cx},${cy} ${sx2},${sy2}`);
                line.classList.add('diag-edge-line');
                if (isSel) line.classList.add('selected-edge');
                line.setAttribute('marker-end', marker);
                g.appendChild(line);

                if (edge.label) {
                    const lx = (sx1+sx2)/2 - (dy/len)*22;
                    const ly = (sy1+sy2)/2 + (dx/len)*22;
                    const lbg = document.createElementNS('http://www.w3.org/2000/svg','rect');
                    const txt = document.createElementNS('http://www.w3.org/2000/svg','text');
                    txt.setAttribute('x', lx); txt.setAttribute('y', ly);
                    txt.setAttribute('text-anchor','middle');
                    txt.setAttribute('dominant-baseline','middle');
                    txt.classList.add('diag-edge-label');
                    txt.textContent = edge.label;
                    // rough bg
                    const tw2 = edge.label.length * 6.5;
                    lbg.setAttribute('x', lx-tw2/2-3); lbg.setAttribute('y', ly-8);
                    lbg.setAttribute('width', tw2+6); lbg.setAttribute('height', 16);
                    lbg.setAttribute('rx','3'); lbg.classList.add('diag-edge-label-bg');
                    g.appendChild(lbg); g.appendChild(txt);
                }

                // click to select / dblclick to edit label
                g.addEventListener('click', e => {
                    e.stopPropagation();
                    const st2 = getDiagState(type);
                    st2.selectedEdge = edge.id;
                    st2.selectedNode = null;
                    diagRedrawEdges(type);
                });
                g.addEventListener('dblclick', e => {
                    e.stopPropagation();
                    diagEditEdgeLabel(type, edge.id, (sx1+sx2)/2, (sy1+sy2)/2 - 40);
                });

                svgEl.appendChild(g);
            });
        }

        // ─── Connect mode ─────────────────────────────────────────
        function diagHandleConnect(type, nodeId) {
            const st = getDiagState(type);
            if (!st.connSource) {
                st.connSource = nodeId;
                diagRedraw(type);
                const hintEl = document.getElementById('diag-hint-' + type);
                if (hintEl) hintEl.textContent = 'Теперь кликните по целевому узлу';
            } else {
                if (st.connSource !== nodeId) {
                    const edge = {
                        id: 'e' + (st.nextEdgeId++),
                        from: st.connSource, to: nodeId, label: ''
                    };
                    st.edges.push(edge);
                    st.connSource = null;
                    diagRedraw(type);
                    // prompt for label
                    const fEl = document.getElementById('diag-node-'+edge.from+'-'+type);
                    const tEl = document.getElementById('diag-node-'+nodeId+'-'+type);
                    if (fEl && tEl) {
                        const x = (fEl.offsetLeft + tEl.offsetLeft)/2;
                        const y = (fEl.offsetTop  + tEl.offsetTop)/2 - 20;
                        diagEditEdgeLabel(type, edge.id, x, y);
                    }
                } else {
                    st.connSource = null;
                    diagRedraw(type);
                }
            }
        }

        // ─── Edge label editing ───────────────────────────────────
        function diagEditEdgeLabel(type, edgeId, x, y) {
            const st = getDiagState(type);
            const canvas = document.getElementById('diag-canvas-' + type);
            const inp = document.getElementById('diag-label-input');
            if (!inp || !canvas) return;
            const edge = st.edges.find(e=>e.id===edgeId);
            if (!edge) return;
            st.editingEdge = { type, edgeId };
            inp.value = edge.label || '';
            inp.style.left = Math.max(5, Math.min(x, canvas.clientWidth-120)) + 'px';
            inp.style.top  = Math.max(5, y) + 'px';
            inp.style.display = 'block';
            inp.focus();
        }

        window.diagLabelKey = function(e, type) {
            if (e.key === 'Enter') { e.preventDefault(); diagLabelCommit(type); }
            if (e.key === 'Escape') { diagLabelCancel(type); }
        };
        window.diagLabelBlur = function(type) {
            // small delay so click doesn't race
            setTimeout(() => diagLabelCommit(type), 150);
        };
        function diagLabelCommit(type) {
            const inp = document.getElementById('diag-label-input');
            if (!inp || inp.style.display === 'none') return;
            const ctx = getDiagState(type).editingEdge;
            if (!ctx || ctx.type !== type) return;
            const st = getDiagState(type);
            const edge = st.edges.find(e=>e.id===ctx.edgeId);
            if (edge) { edge.label = inp.value.trim(); }
            inp.style.display = 'none';
            inp.value = '';
            st.editingEdge = null;
            diagRedrawEdges(type);
            diagLiveCheck(type);
        }
        function diagLabelCancel(type) {
            const inp = document.getElementById('diag-label-input');
            if (inp) inp.style.display = 'none';
            getDiagState(type).editingEdge = null;
        }

        // ─── Delete ───────────────────────────────────────────────
        window.diagDeleteNode = function(type, nodeId) {
            const st = getDiagState(type);
            st.nodes  = st.nodes.filter(n=>n.id!==nodeId);
            st.edges  = st.edges.filter(e=>e.from!==nodeId && e.to!==nodeId);
            if (st.selectedNode===nodeId) st.selectedNode=null;
            if (st.connSource===nodeId)   st.connSource=null;
            // Remove DOM element directly (don't full-redraw which would lose other nodes)
            const el = document.getElementById('diag-node-' + nodeId + '-' + type);
            if (el) el.remove();
            diagRedrawEdges(type);
            diagLiveCheck(type);
        };

        window.diagDeleteSelected = function(type) {
            const st = getDiagState(type);
            if (st.selectedNode) {
                diagDeleteNode(type, st.selectedNode);
                st.selectedNode = null;
                return;
            }
            if (st.selectedEdge) {
                st.edges = st.edges.filter(e=>e.id!==st.selectedEdge);
                st.selectedEdge = null;
                diagRedrawEdges(type);
                diagLiveCheck(type);
            }
        };

        window.diagClear = function(type) {
            const st = getDiagState(type);
            // Remove all node DOM elements
            const canvas = document.getElementById('diag-canvas-' + type);
            if (canvas) canvas.querySelectorAll('.diag-cnode').forEach(el=>el.remove());
            st.nodes=[]; st.edges=[];
            st.nextNodeId=1; st.nextEdgeId=1;
            st.mode='select'; st.connSource=null;
            st.selectedNode=null; st.selectedEdge=null;
            diagSetMode(type,'select');
            diagRedrawEdges(type);
            diagLiveCheck(type);
            const res = document.getElementById('diag-result-' + type);
            if (res) res.innerHTML='';
        };

        // ─── Live checklist update ────────────────────────────────
        function diagLiveCheck(type) {
            const st   = getDiagState(type);
            const task = DIAG_TASKS[type];
            if (!task) return;
            const g = { nodes: st.nodes, edges: st.edges };
            task.checks.forEach(c => {
                const li = document.getElementById(`diag-chk-${type}-${c.id}`);
                if (!li) return;
                const ok = c.fn(g);
                const icon = li.querySelector('.diag-chk-icon');
                if (icon) {
                    icon.textContent = ok ? '●' : '○';
                    icon.className = 'diag-chk-icon ' + (ok ? 'diag-chk-done' : 'diag-chk-miss');
                }
            });
        }

        // ─── Verify ───────────────────────────────────────────────
        window.diagVerify = function(type) {
            const st   = getDiagState(type);
            const task = DIAG_TASKS[type];
            const g    = { nodes: st.nodes, edges: st.edges };
            const results = task.checks.map(c => ({ ...c, ok: c.fn(g) }));
            const passed  = results.filter(r=>r.ok).length;
            const total   = results.length;
            const res = document.getElementById('diag-result-' + type);
            if (!res) return;

            diagLiveCheck(type);

            if (passed === total) {
                res.innerHTML = `<div class="diag-result-banner ok">🎉 Отлично! Диаграмма содержит все необходимые элементы (${total}/${total}).</div>`;
                markComplete();
            } else if (passed >= Math.ceil(total * 0.6)) {
                const missing = results.filter(r=>!r.ok).map(r=>`• ${r.text}`).join('<br>');
                res.innerHTML = `<div class="diag-result-banner warn">⚠️ ${passed}/${total} проверок пройдено. Недостаёт:<br>${missing}</div>`;
            } else {
                res.innerHTML = `<div class="diag-result-banner fail">✗ Пройдено ${passed}/${total}. Посмотрите на чек-лист выше и добавьте недостающие элементы.</div>`;
            }
        };


        // ══════════════════════════════════════════════════════════
        //  MIND-MAP EDITOR  (lesson 2.7)
        // ══════════════════════════════════════════════════════════

        const MM_COLORS = ['#deebff','#e3fcef','#fff0b3','#ffebe6','#f3f0ff','#e6fcff','#f4f5f7'];
        const MM_STROKE = ['#0052cc','#36b37e','#ff8b00','#de350b','#6554c0','#00b8d9','#6b778c'];

        const MM_TASKS = {
            interface: {
                title: '🖥️ Mind-map интерфейса',
                desc: `Нарисуйте mind-map для страницы товара интернет-магазина.<br><br>
                       <strong>Обязательные блоки:</strong><br>
                       Хэдер, Карточка товара, Описание, Отзывы, Футер.<br><br>
