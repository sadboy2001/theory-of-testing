                rootLabel: 'Страница товара',
                rootColor: 0,
                checks: [
                    { id:'i1', text:'Корневой узел (страница)', fn: g => g.nodes.length >= 1 },
                    { id:'i2', text:'Блок «Хэдер» с дочерними элементами', fn: g => mmHasChildOf(g, /хэдер|header/i) },
                    { id:'i3', text:'Блок «Карточка товара» или «Товар»', fn: g => g.nodes.some(n => /товар|product|карточк/i.test(n.label)) },
                    { id:'i4', text:'Блок «Описание»', fn: g => g.nodes.some(n => /описани|descript/i.test(n.label)) },
                    { id:'i5', text:'Блок «Отзывы» или «Комментарии»', fn: g => g.nodes.some(n => /отзыв|review|коммент/i.test(n.label)) },
                    { id:'i6', text:'Блок «Футер»', fn: g => g.nodes.some(n => /футер|footer/i.test(n.label)) },
                    { id:'i7', text:'Минимум 8 элементов на карте', fn: g => g.nodes.length >= 8 },
                    { id:'i8', text:'Минимум 7 связей между узлами', fn: g => g.edges.length >= 7 },
                ]
            },
            actions: {
                title: '⚡ Mind-map действий: сущность «Заказ»',
                desc: `Нарисуйте mind-map действий для сущности «Заказ».<br><br>
                       Центр — сущность «Заказ». От неё ветви — <strong>действия</strong> (глаголы: создать, отменить, оплатить…) и <strong>статусы</strong>.<br><br>
                       Добавьте как минимум 6 разных действий или состояний.`,
                rootLabel: 'Заказ',
                rootColor: 2,
                checks: [
                    { id:'a1', text:'Корневой узел «Заказ»', fn: g => g.nodes.some(n => /заказ/i.test(n.label)) },
                    { id:'a2', text:'Действие «Создать» или «Оформить»', fn: g => g.nodes.some(n => /создат|оформ/i.test(n.label)) },
                    { id:'a3', text:'Действие «Оплатить»', fn: g => g.nodes.some(n => /оплат|pay/i.test(n.label)) },
                    { id:'a4', text:'Действие «Отменить»', fn: g => g.nodes.some(n => /отмен|cancel/i.test(n.label)) },
                    { id:'a5', text:'Статус «Доставлен» или «Доставка»', fn: g => g.nodes.some(n => /доставл|deliver/i.test(n.label)) },
                    { id:'a6', text:'Минимум 6 ветвей от корня и дочерних узлов', fn: g => g.nodes.length >= 6 },
                    { id:'a7', text:'Минимум 5 связей', fn: g => g.edges.length >= 5 },
                ]
            }
        };

        function mmHasChildOf(g, re) {
            const parent = g.nodes.find(n => re.test(n.label));
            if (!parent) return false;
            return g.edges.some(e => e.from === parent.id);
        }

        // ─── Per-instance state ──────────────────────────────────
        const mmStates = {};
        function getMmState(type) {
            if (!mmStates[type]) {
                mmStates[type] = {
                    nodes: [],   // {id,label,x,y,colorIdx,parentId|null}
                    edges: [],   // {id,from,to}
                    nextId: 1,
                    selectedNode: null,
                    activeColor: 0,
                };
            }
            return mmStates[type];
        }

        // ─── Render entry ─────────────────────────────────────────
        function renderMindmap(container, step, isCompleted) {
            const type = step.mmType;
            const task = MM_TASKS[type];
            if (!task) { container.innerHTML='<p>Тип не найден</p>'; return; }

            const colorPicker = MM_COLORS.map((c,i)=>
                `<div class="mm-tb-color${i===0?' active':''}" data-cidx="${i}"
                     style="background:${c};border-color:${MM_STROKE[i]}"
                     onclick="mmSetColor('${type}',${i})" title="Цвет ${i+1}"></div>`).join('');

            const checks = task.checks.map(c=>`
                <li id="mm-chk-${type}-${c.id}">
                    <span class="mm-chk-icon mm-chk-miss">○</span>
                    <span>${c.text}</span>
                </li>`).join('');

            container.innerHTML = `
                <div class="mm-wrap">
                    <h1>${task.title}</h1>
                    <div class="mm-layout">
                        <div class="mm-sidebar">
                            <div>
                                <div class="mm-sidebar-sec">📋 Задание</div>
                                <div class="mm-task-desc">${task.desc}</div>
                            </div>
                            <div>
                                <div class="mm-sidebar-sec">💡 Как работать</div>
                                <div style="font-size:11px;color:#6b778c;line-height:1.6;background:white;border:1px solid #dfe1e6;border-radius:6px;padding:10px;">
                                    <b>+</b> на узле → добавить дочерний<br>
                                    <b>×</b> на узле → удалить<br>
                                    <b>Двойной клик</b> по узлу → изменить текст<br>
                                    <b>Перетащить</b> узел за ручку ⠿
                                </div>
                            </div>
                        </div>
                        <div>
                            <div class="mm-canvas-wrap">
                                <div class="mm-toolbar">
                                    <button class="mm-tb-btn" onclick="mmAddRoot('${type}')">＋ Узел</button>
                                    <div class="mm-tb-sep"></div>
                                    <span class="mm-tb-hint">Цвет нового узла:</span>
                                    ${colorPicker}
                                    <div class="mm-tb-sep"></div>
                                    <button class="mm-tb-btn" onclick="mmDeleteSelected('${type}')">🗑 Удалить выбранный</button>
                                </div>
                                <div class="mm-canvas" id="mm-canvas-${type}">
                                    <svg class="mm-svg" id="mm-svg-${type}"></svg>
                                </div>
                            </div>
                            <div class="mm-check-panel">
                                <h4>✅ Что должно быть на карте</h4>
                                <ul class="mm-checklist" id="mm-checklist-${type}">${checks}</ul>
                                <button class="mm-verify-btn" onclick="mmVerify('${type}')">🔍 Проверить</button>
                                <button class="mm-clear-btn" onclick="mmClear('${type}')">↺ Очистить</button>
                                <div id="mm-result-${type}"></div>
                            </div>
                        </div>
                    </div>
                </div>`;

            // Create root node
            const st = getMmState(type);
            if (st.nodes.length === 0) {
                const canvas = document.getElementById('mm-canvas-' + type);
                const cx = canvas ? canvas.clientWidth/2 - 60 : 340;
                const cy = canvas ? canvas.clientHeight/2 - 20 : 260;
                mmAddNodeInternal(type, task.rootLabel, cx, cy, task.rootColor, null, true);
            }
            mmRedraw(type);
        }

        // ─── Add nodes ────────────────────────────────────────────
        window.mmAddRoot = function(type) {
            const canvas = document.getElementById('mm-canvas-' + type);
            const st = getMmState(type);
            const x = 50 + Math.random() * (canvas ? canvas.clientWidth  - 200 : 400);
            const y = 50 + Math.random() * (canvas ? canvas.clientHeight - 100 : 300);
            mmAddNodeInternal(type, 'Узел', x, y, st.activeColor, null, false);
        };

        function mmAddChild(type, parentId) {
            const st = getMmState(type);
            const parent = st.nodes.find(n => n.id === parentId);
            if (!parent) return;
            // Place child to the right or below
            const angle = (st.edges.filter(e=>e.from===parentId).length * 45) * Math.PI/180;
            const dist  = 130;
            const x = parent.x + Math.cos(angle) * dist;
            const y = parent.y + Math.sin(angle) * dist;
            const childId = mmAddNodeInternal(type, 'Элемент', x, y, st.activeColor, parentId, false);
            // Connect
            const eid = 'me' + (st.nextId++);
            st.edges.push({ id: eid, from: parentId, to: childId });
            mmRedraw(type);
        }

        function mmAddNodeInternal(type, label, x, y, colorIdx, parentId, isRoot) {
            const st = getMmState(type);
            const id = 'mn' + (st.nextId++);
            st.nodes.push({ id, label, x, y, colorIdx: colorIdx ?? 0, isRoot: !!isRoot });
            mmCreateNodeEl(type, st.nodes[st.nodes.length-1]);
            mmLiveCheck(type);
            return id;
        }

        // ─── Create node DOM element (persistent) ────────────────
        function mmCreateNodeEl(type, n) {
            const canvas = document.getElementById('mm-canvas-' + type);
            if (!canvas) return;

            const el = document.createElement('div');
            el.className = 'mm-node' + (n.isRoot ? ' root-node' : '');
            el.id = 'mm-node-' + n.id + '-' + type;
            el.style.left       = n.x + 'px';
            el.style.top        = n.y + 'px';
            el.style.background = MM_COLORS[n.colorIdx] || MM_COLORS[0];
            el.style.borderColor= MM_STROKE[n.colorIdx] || MM_STROKE[0];
            el.style.color      = MM_STROKE[n.colorIdx] || MM_STROKE[0];

            // Inline editable text
            const inp = document.createElement('textarea');
            inp.className = 'mm-node-input';
            inp.value = n.label;
            inp.rows  = 1;
            mmAutoResize(inp);
            inp.addEventListener('input', () => {
                n.label = inp.value;
                mmAutoResize(inp);
                mmRedrawEdges(type);
                mmLiveCheck(type);
            });
            inp.addEventListener('mousedown', e => e.stopPropagation());
            el.appendChild(inp);

            // Add-child button
            const addBtn = document.createElement('button');
            addBtn.className = 'mm-add-child';
            addBtn.textContent = '+';
            addBtn.title = 'Добавить дочерний узел';
            addBtn.style.right  = '-12px';
            addBtn.style.top    = '50%';
            addBtn.style.transform = 'translateY(-50%)';
            addBtn.addEventListener('mousedown', e => e.stopPropagation());
            addBtn.addEventListener('click', e => {
                e.stopPropagation();
                mmAddChild(type, n.id);
            });
            el.appendChild(addBtn);

            // Delete button
            const del = document.createElement('button');
            del.className = 'mm-node-del';
            del.innerHTML = '&times;';
            del.title = 'Удалить узел';
            del.addEventListener('mousedown', e => e.stopPropagation());
            del.addEventListener('click', e => {
                e.stopPropagation();
                mmDeleteNode(type, n.id);
            });
            el.appendChild(del);

            // Drag — whole element
            el.addEventListener('mousedown', e => {
                if (e.target === inp || e.target === del || e.target === addBtn) return;
                const st = getMmState(type);
                st.selectedNode = n.id;
                mmUpdateNodeClasses(type);

                const startX = e.clientX - n.x;
                const startY = e.clientY - n.y;
                function onMove(ev) {
                    n.x = Math.max(0, Math.min(ev.clientX - startX, canvas.clientWidth  - el.offsetWidth));
                    n.y = Math.max(0, Math.min(ev.clientY - startY, canvas.clientHeight - el.offsetHeight));
                    el.style.left = n.x + 'px';
                    el.style.top  = n.y + 'px';
                    mmRedrawEdges(type);
                }
                function onUp() {
                    document.removeEventListener('mousemove', onMove);
                    document.removeEventListener('mouseup',   onUp);
                    el.style.cursor = '';
                }
                document.addEventListener('mousemove', onMove);
                document.addEventListener('mouseup',   onUp);
                el.style.cursor = 'grabbing';
                e.preventDefault();
            });

            // Click on canvas bg → deselect
            canvas.addEventListener('mousedown', e => {
                if (e.target === canvas || e.target.tagName === 'svg') {
                    getMmState(type).selectedNode = null;
                    mmUpdateNodeClasses(type);
                }
            });

            canvas.appendChild(el);
        }

        function mmAutoResize(ta) {
            ta.style.height = '0';
            ta.style.height = ta.scrollHeight + 'px';
        }

        // ─── Update classes only (no DOM recreate) ────────────────
        function mmUpdateNodeClasses(type) {
            const st = getMmState(type);
            st.nodes.forEach(n => {
                const el = document.getElementById('mm-node-' + n.id + '-' + type);
                if (!el) return;
                el.className = 'mm-node' + (n.isRoot?' root-node':'') + (st.selectedNode===n.id?' selected':'');
                el.style.background  = MM_COLORS[n.colorIdx] || MM_COLORS[0];
                el.style.borderColor = MM_STROKE[n.colorIdx] || MM_STROKE[0];
                el.style.color       = MM_STROKE[n.colorIdx] || MM_STROKE[0];
            });
        }

        // ─── Full redraw (only creates missing nodes) ─────────────
        function mmRedraw(type) {
            const st = getMmState(type);
            const canvas = document.getElementById('mm-canvas-' + type);
            if (!canvas) return;

            // Remove DOM nodes no longer in state
            canvas.querySelectorAll('.mm-node').forEach(el => {
                const m = el.id.match(/^mm-node-(mn\d+)-/);
                if (m && !st.nodes.find(n => n.id === m[1])) el.remove();
            });

            // Create new nodes
            const existing = new Set([...canvas.querySelectorAll('.mm-node')].map(el => {
                const m = el.id.match(/^mm-node-(mn\d+)-/);
                return m ? m[1] : null;
            }).filter(Boolean));

            st.nodes.forEach(n => {
                if (!existing.has(n.id)) mmCreateNodeEl(type, n);
            });

            mmUpdateNodeClasses(type);
            mmRedrawEdges(type);
            mmLiveCheck(type);
        }

        // ─── Draw SVG edges ───────────────────────────────────────
        function mmRedrawEdges(type) {
            const st  = getMmState(type);
            const svg = document.getElementById('mm-svg-' + type);
            if (!svg) return;
            svg.innerHTML = '';

            st.edges.forEach(e => {
                const fn = st.nodes.find(n=>n.id===e.from);
                const tn = st.nodes.find(n=>n.id===e.to);
                if (!fn||!tn) return;
                const fEl = document.getElementById('mm-node-'+fn.id+'-'+type);
                const tEl = document.getElementById('mm-node-'+tn.id+'-'+type);
                const fw = fEl?fEl.offsetWidth:80,  fh = fEl?fEl.offsetHeight:32;
                const tw = tEl?tEl.offsetWidth:80,  th = tEl?tEl.offsetHeight:32;

                const x1 = fn.x + fw/2, y1 = fn.y + fh/2;
                const x2 = tn.x + tw/2, y2 = tn.y + th/2;
                const cx = (x1+x2)/2, cy = (y1+y2)/2;

                const stroke = MM_STROKE[fn.colorIdx] || '#6b778c';
                const path = document.createElementNS('http://www.w3.org/2000/svg','path');
                path.setAttribute('d', `M${x1},${y1} Q${cx},${cy-20} ${x2},${y2}`);
                path.setAttribute('stroke', stroke);
                path.setAttribute('stroke-width','2');
                path.setAttribute('fill','none');
                path.setAttribute('stroke-linecap','round');
                svg.appendChild(path);
            });
        }

        // ─── Delete ───────────────────────────────────────────────
        function mmDeleteNode(type, nodeId) {
            const st = getMmState(type);
            // Also delete all children recursively
            function collectDescendants(id) {
                const childEdges = st.edges.filter(e=>e.from===id);
                let ids = [id];
                childEdges.forEach(e => ids = ids.concat(collectDescendants(e.to)));
                return ids;
            }
            const toDelete = collectDescendants(nodeId);
            toDelete.forEach(id => {
                const el = document.getElementById('mm-node-'+id+'-'+type);
                if (el) el.remove();
            });
            st.nodes = st.nodes.filter(n => !toDelete.includes(n.id));
            st.edges = st.edges.filter(e => !toDelete.includes(e.from) && !toDelete.includes(e.to));
            if (toDelete.includes(st.selectedNode)) st.selectedNode = null;
            mmRedrawEdges(type);
            mmLiveCheck(type);
        }

        window.mmDeleteSelected = function(type) {
            const st = getMmState(type);
            if (st.selectedNode) mmDeleteNode(type, st.selectedNode);
        };

        window.mmSetColor = function(type, idx) {
            const st = getMmState(type);
            st.activeColor = idx;
            // Update colour picker UI
            document.querySelectorAll(`#mm-canvas-${type}`).forEach(() => {});
            const wrap = document.querySelector(`#mm-canvas-${type}`)?.closest('.mm-canvas-wrap');
            if (wrap) {
                wrap.querySelectorAll('.mm-tb-color').forEach(el => {
                    el.classList.toggle('active', +el.dataset.cidx === idx);
                });
            }
            // Apply to selected node
            if (st.selectedNode) {
                const n = st.nodes.find(n=>n.id===st.selectedNode);
                if (n) {
                    n.colorIdx = idx;
                    mmUpdateNodeClasses(type);
                    mmRedrawEdges(type);
                }
            }
        };

        window.mmClear = function(type) {
            const st = getMmState(type);
            const canvas = document.getElementById('mm-canvas-' + type);
            if (canvas) canvas.querySelectorAll('.mm-node').forEach(el=>el.remove());
            st.nodes=[]; st.edges=[]; st.nextId=1; st.selectedNode=null;
            mmRedrawEdges(type);
            mmLiveCheck(type);
            const res = document.getElementById('mm-result-'+type);
            if (res) res.innerHTML='';
            // Re-add root
            const task = MM_TASKS[type];
            if (!task) return;
            const cv = document.getElementById('mm-canvas-'+type);
            const cx = cv?cv.clientWidth/2-60:340, cy=cv?cv.clientHeight/2-20:260;
            mmAddNodeInternal(type, task.rootLabel, cx, cy, task.rootColor, null, true);
            mmRedrawEdges(type);
        };

        // ─── Live checklist ───────────────────────────────────────
        function mmLiveCheck(type) {
            const st   = getMmState(type);
            const task = MM_TASKS[type];
            if (!task) return;
            const g = { nodes: st.nodes, edges: st.edges };
            task.checks.forEach(c => {
                const li = document.getElementById(`mm-chk-${type}-${c.id}`);
                if (!li) return;
                const ok = c.fn(g);
                const ico = li.querySelector('.mm-chk-icon');
                if (ico) { ico.textContent = ok?'●':'○'; ico.className='mm-chk-icon '+(ok?'mm-chk-done':'mm-chk-miss'); }
            });
        }

        // ─── Verify ───────────────────────────────────────────────
        window.mmVerify = function(type) {
            const st   = getMmState(type);
            const task = MM_TASKS[type];
            const g    = { nodes: st.nodes, edges: st.edges };
            const results = task.checks.map(c=>({ ...c, ok: c.fn(g) }));
            const passed  = results.filter(r=>r.ok).length;
            const total   = results.length;
            mmLiveCheck(type);
            const res = document.getElementById('mm-result-' + type);
            if (!res) return;
            if (passed === total) {
                res.innerHTML = `<div class="mm-result-banner ok">🎉 Отлично! Mind-map содержит все необходимые элементы (${total}/${total}).</div>`;
                markComplete();
            } else if (passed >= Math.ceil(total*0.6)) {
                const miss = results.filter(r=>!r.ok).map(r=>`• ${r.text}`).join('<br>');
                res.innerHTML = `<div class="mm-result-banner warn">⚠️ ${passed}/${total} выполнено. Добавьте:<br>${miss}</div>`;
            } else {
                res.innerHTML = `<div class="mm-result-banner fail">✗ ${passed}/${total}. Разверните карту — добавьте больше узлов.</div>`;
            }
        };

    </script>
</body>
</html>
